<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #181B1F;
    --surface: #242830;
    --surface2: #2E3340;
    --text: #FFFFFF;
    --text2: rgba(255,255,255,0.6);
    --accent: #E5FF5D;
    --purple: #CABAF9;
    --purple-strong: #AB7DFF;
    --green: #27C55A;
    --red: #FF5756;
    --orange: #FF8347;
    --border: rgba(255,255,255,0.1);
    --glass: rgba(36,40,48,0.8);
    --radius: 12px;
    --radius-pill: 9999px;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    padding-top: env(safe-area-inset-top, 16px);
    padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 20px);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }

  .stats { font-size: 13px; color: var(--text2); margin-bottom: 12px; text-align: center; }
  .stats span { margin: 0 8px; }
  .progress-bar { width: 100%; max-width: 480px; height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-strong), var(--accent)); border-radius: 2px; transition: width 0.3s; }

  .card-container { perspective: 1000px; width: 100%; max-width: 480px; height: 260px; margin-bottom: 20px; cursor: pointer; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius); padding: 24px; background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(12px); }
  .card-front { background: var(--surface); }
  .card-back { background: var(--surface); transform: rotateY(180deg); }
  .card-word { font-size: 28px; font-weight: 600; margin-bottom: 8px; text-align: center; line-height: 1.3; letter-spacing: -0.02em; }
  .card-hint { font-size: 13px; color: var(--text2); }
  .card-tag { position: absolute; top: 14px; right: 14px; font-size: 11px; color: var(--purple); background: rgba(202,186,249,0.1); padding: 4px 10px; border-radius: var(--radius-pill); font-weight: 500; }

  .buttons { display: flex; gap: 10px; width: 100%; max-width: 480px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; letter-spacing: -0.01em; }
  .btn:active { transform: scale(0.97); }
  .btn-again { background: rgba(255,87,86,0.15); color: var(--red); border: 1px solid rgba(255,87,86,0.3); }
  .btn-good { background: var(--accent); color: #181B1F; }
  .btn-good:active { filter: brightness(0.95); }
  .btn-show { background: var(--purple-strong); color: #fff; }
  .btn-skip { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-next { background: var(--purple-strong); color: #fff; }

  .lesson-filter { display: flex; flex-wrap: wrap; gap: 4px; max-width: 480px; margin-bottom: 12px; justify-content: center; }
  .lesson-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text2); font-family: inherit; }
  .lesson-btn.active { border-color: var(--purple-strong); background: rgba(171,125,255,0.15); color: var(--purple); }

  .mode-toggle { display: flex; flex-wrap: wrap; gap: 4px; max-width: 540px; width: 100%; margin-bottom: 14px; justify-content: center; }
  .mode-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all 0.2s; white-space: nowrap; font-family: inherit; }
  .mode-btn.active { border-color: var(--accent); background: rgba(229,255,93,0.1); color: var(--accent); }

  .done-screen { text-align: center; padding: 40px 20px; }
  .done-screen h2 { font-size: 26px; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.02em; }
  .done-screen p { color: var(--text2); margin-bottom: 24px; font-size: 15px; }
  .done-screen .btn { max-width: 200px; margin: 0 auto; display: block; }
  .score-circle { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--purple-strong), var(--accent)); color: #181B1F; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto 16px; }

  .type-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; margin-bottom: 20px; text-align: center; }
  .type-card .card-tag { position: static; display: inline-block; margin-bottom: 12px; }
  .type-prompt { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .type-word { font-size: 28px; font-weight: 600; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.02em; }
  .type-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 18px; text-align: center; outline: none; transition: border-color 0.2s; font-family: inherit; background: var(--bg); color: var(--text); }
  .type-input:focus { border-color: var(--purple-strong); }
  .type-input.correct { border-color: var(--green); background: rgba(39,197,90,0.1); color: var(--green); }
  .type-input.wrong { border-color: var(--red); background: rgba(255,87,86,0.1); color: var(--red); }
  .type-answer { margin-top: 12px; font-size: 18px; font-weight: 600; color: var(--green); min-height: 30px; }
  .type-answer.show-wrong { color: var(--red); }

  /* Quiz mode */
  .quiz-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; margin-bottom: 20px; text-align: center; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
  .quiz-opt { padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-size: 15px; cursor: pointer; transition: all 0.2s; text-align: left; font-family: inherit; color: var(--text); }
  .quiz-opt:hover { border-color: var(--purple-strong); background: rgba(171,125,255,0.08); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(39,197,90,0.15); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: rgba(255,87,86,0.1); color: var(--red); }
  .quiz-opt.dim { opacity: 0.4; }
  .quiz-opt[disabled] { cursor: default; }

  /* Match mode */
  .match-area { width: 100%; max-width: 480px; margin-bottom: 20px; }
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .match-item { padding: 12px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: center; font-family: inherit; min-height: 48px; display: flex; align-items: center; justify-content: center; color: var(--text); }
  .match-item.selected { border-color: var(--purple-strong); background: rgba(171,125,255,0.15); }
  .match-item.matched { border-color: var(--green); background: rgba(39,197,90,0.1); opacity: 0.5; cursor: default; }
  .match-item.error { border-color: var(--red); background: rgba(255,87,86,0.1); animation: shake 0.4s; }
  .match-score { text-align: center; margin-bottom: 10px; font-size: 13px; color: var(--text2); }
  @keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

  /* TTS button */
  .tts-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 6px; opacity: 0.4; transition: opacity 0.2s; vertical-align: middle; }
  .tts-btn:hover, .tts-btn:active { opacity: 1; }

  /* Learn mode */
  .learn-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; margin-bottom: 20px; text-align: center; }
  .learn-nl { font-size: 26px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; letter-spacing: -0.02em; }
  .learn-en { font-size: 17px; color: var(--text2); margin-bottom: 4px; line-height: 1.3; }
  .learn-count { font-size: 12px; color: var(--text2); margin-top: 12px; }

  /* Build mode */
  .build-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; margin-bottom: 20px; text-align: center; }
  .build-prompt { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.02em; }
  .build-slots { min-height: 50px; border: 2px dashed rgba(255,255,255,0.15); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
  .build-slots.correct { border-color: var(--green); background: rgba(39,197,90,0.1); }
  .build-slots.wrong { border-color: var(--red); background: rgba(255,87,86,0.1); }
  .build-words { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .build-word { padding: 8px 14px; border: 1px solid var(--purple-strong); border-radius: var(--radius-pill); background: rgba(171,125,255,0.1); font-size: 15px; cursor: pointer; transition: all 0.2s; font-family: inherit; color: var(--purple); }
  .build-word:hover, .build-word:active { background: var(--purple-strong); color: #fff; }
  .build-word.used { opacity: 0.2; pointer-events: none; }
  .build-placed { padding: 8px 14px; border: 1px solid var(--purple-strong); border-radius: var(--radius-pill); background: var(--purple-strong); color: #fff; font-size: 15px; cursor: pointer; transition: all 0.2s; }

  /* Speak mode */
  .speak-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; margin-bottom: 20px; text-align: center; }
  .speak-tag { font-size: 11px; color: var(--purple); background: rgba(202,186,249,0.1); padding: 4px 10px; border-radius: var(--radius-pill); display: inline-block; margin-bottom: 12px; font-weight: 500; }
  .speak-q { font-size: 22px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; letter-spacing: -0.02em; }
  .speak-q-en { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.4; }
  .speak-answer { font-size: 18px; color: var(--green); font-weight: 500; min-height: 56px; display: flex; align-items: center; justify-content: center; line-height: 1.4; padding: 12px; border-top: 1px solid var(--border); }
  .speak-answer.hidden { color: transparent; user-select: none; }
  .speak-hint { font-size: 12px; color: var(--text2); margin-top: 8px; }
  .speak-filter { display: flex; flex-wrap: wrap; gap: 4px; max-width: 480px; margin-bottom: 12px; justify-content: center; }
  .speak-filter-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 11px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text2); font-family: inherit; }
  .speak-filter-btn.active { border-color: var(--purple-strong); background: rgba(171,125,255,0.15); color: var(--purple); }
</style>

let mode = 'nl';
let activeLessons = new Set();
let deck = [], current = 0, known = 0, again = [], sessionTotal = 0;
let isFlipped = false, typeState = 'input';
let matchState = {};
let speakTopics = new Set();
let speakAnswerVisible = false;

function getAllLessons() { return [...new Set(ALL_CARDS.map(c => c[2]))].sort((a,b) => +a - +b); }
function getFiltered() { return ALL_CARDS.filter(c => activeLessons.has(c[2])); }
function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function norm(s) { return s.toLowerCase().trim().replace(/['']/g,"'").replace(/[éè]/g,'e').replace(/ë/g,'e'); }

// ---- TTS ----
let nlVoice = null;
function initVoices() {
  const voices = speechSynthesis.getVoices();
  nlVoice = voices.find(v => v.lang === 'nl-NL') || voices.find(v => v.lang.startsWith('nl')) || null;
}
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function sayNL(text) {
  speechSynthesis.cancel();
  // strip parenthetical numbers like (100)
  const clean = text.replace(/\(\d+\)/g, '').trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'nl-NL';
  u.rate = 0.85;
  if (nlVoice) u.voice = nlVoice;
  speechSynthesis.speak(u);
}
function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();sayNL('${text.replace(/'/g,"\\'")}')" title="Listen">&#128264;</button>`;
}

function buildLessonFilter() {
  const c = document.getElementById('lessonFilter');
  const lessons = getAllLessons();
  // select all by default
  lessons.forEach(l => activeLessons.add(l));

  const allBtn = document.createElement('button');
  allBtn.className = 'lesson-btn active'; allBtn.textContent = 'All'; allBtn.id = 'allBtn';
  allBtn.onclick = () => {
    const allActive = getAllLessons().every(l => activeLessons.has(l));
    if (allActive) { activeLessons.clear(); } else { getAllLessons().forEach(l => activeLessons.add(l)); }
    syncFilterUI(); startSession();
  };
  c.appendChild(allBtn);

  lessons.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn active'; btn.textContent = l; btn.dataset.les = l;
    btn.onclick = () => {
      if (activeLessons.has(l)) activeLessons.delete(l); else activeLessons.add(l);
      syncFilterUI(); startSession();
    };
    c.appendChild(btn);
  });
}

function syncFilterUI() {
  document.querySelectorAll('.lesson-btn').forEach(btn => {
    if (btn.id === 'allBtn') {
      btn.classList.toggle('active', getAllLessons().every(l => activeLessons.has(l)));
    } else {
      btn.classList.toggle('active', activeLessons.has(btn.dataset.les));
    }
  });
}

function setMode(m) {
  mode = m;
  const modes = ['learn','build','nl','en','type','quiz','match','speak'];
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', modes[i] === m);
  });
  document.getElementById('lessonFilter').style.display = m === 'speak' ? 'none' : 'flex';
  if (m === 'speak') {
    showSpeakFilter();
    startSpeakSession();
  } else {
    const sf = document.getElementById('speakFilter');
    if (sf) sf.style.display = 'none';
    startSession();
  }
}

function startSession() {
  const filtered = getFiltered();
  if (mode === 'match') {
    startMatchSession(filtered);
    return;
  }
  deck = shuffle(filtered.map(c => [...c]));
  sessionTotal = deck.length;
  current = 0; known = 0; again = []; isFlipped = false; typeState = 'input';
  if (deck.length > 0) showCard(); else showEmpty();
  updateStats();
}

function showCard() {
  if (current >= deck.length) {
    if (again.length > 0) { deck = shuffle(again); again = []; current = 0; showCard(); return; }
    showDone(); return;
  }
  if (mode === 'learn') showLearnCard();
  else if (mode === 'build') showBuildCard();
  else if (mode === 'type') showTypeCard();
  else if (mode === 'quiz') showQuizCard();
  else showFlipCard();
  updateStats();
}

function updateStats() {
  const rem = (deck.length - current) + again.length;
  document.getElementById('stats').innerHTML = `<span>${rem} left</span><span>${known} learned</span>`;
  const pct = sessionTotal > 0 ? (known / sessionTotal) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showDone() {
  const pct = sessionTotal > 0 ? Math.round((known / sessionTotal) * 100) : 0;
  document.getElementById('mainArea').innerHTML = `<div class="done-screen"><div class="score-circle">${pct}%</div><h2>Done!</h2><p>${known} / ${sessionTotal} learned</p><button class="btn btn-good" onclick="startSession()">Again</button></div>`;
}

function showEmpty() {
  document.getElementById('mainArea').innerHTML = '<div class="done-screen"><p>Select lessons above</p></div>';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
}

// ---- FLIP ----
function showFlipCard() {
  const c = deck[current]; isFlipped = false;
  const [f, b] = mode === 'en' ? [c[1], c[0]] : [c[0], c[1]];
  const nlText = c[0];
  document.getElementById('mainArea').innerHTML = `
    <div class="card-container" onclick="flipCard()"><div class="card" id="card">
      <div class="card-face card-front"><div class="card-tag">Les ${c[2]}</div><div class="card-word">${f} ${mode==='nl' ? ttsBtn(nlText) : ''}</div><div class="card-hint">tap to flip</div></div>
      <div class="card-face card-back"><div class="card-tag">Les ${c[2]}</div><div class="card-word">${b} ${mode==='en' ? ttsBtn(nlText) : ''}</div></div>
    </div></div>
    <div class="buttons" id="buttons"><button class="btn btn-show" onclick="flipCard()">Show</button></div>`;
}
function flipCard() {
  if (isFlipped) return; isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('buttons').innerHTML = '<button class="btn btn-again" onclick="markAgain()">Again</button><button class="btn btn-good" onclick="markGood()">Know it</button>';
}

function showTypeCard() {
  const c = deck[current]; typeState = 'input';
  document.getElementById('mainArea').innerHTML = `
    <div class="type-card"><div class="card-tag">Les ${c[2]}</div>
      <div class="type-prompt">Type in Dutch:</div><div class="type-word">${c[1]}</div>
      <input type="text" class="type-input" id="typeInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="..." />
      <div class="type-answer" id="typeAnswer"></div>
    </div>
    <div class="buttons" id="buttons"><button class="btn btn-show" onclick="checkTyped()">Check</button><button class="btn btn-skip" onclick="skipTyped()">Skip</button></div>`;
  setTimeout(() => {
    const inp = document.getElementById('typeInput');
    if (inp) { inp.focus(); inp.onkeydown = e => { if (e.key==='Enter'){e.preventDefault(); if(typeState==='input')checkTyped();else{current++;showCard();}} }; }
  }, 50);
}
function checkTyped() {
  if (typeState !== 'input') return; typeState = 'result';
  const c = deck[current], inp = document.getElementById('typeInput'), ans = document.getElementById('typeAnswer');
  const ok = norm(inp.value) === norm(c[0]);
  inp.disabled = true;
  if (ok) { inp.classList.add('correct'); ans.innerHTML = 'Correct! ' + ttsBtn(c[0]); known++; }
  else { inp.classList.add('wrong'); ans.classList.add('show-wrong'); ans.innerHTML = c[0] + ' ' + ttsBtn(c[0]); again.push(c); }
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
  updateStats();
}
function skipTyped() {
  const c = deck[current]; typeState = 'result';
  const inp = document.getElementById('typeInput'), ans = document.getElementById('typeAnswer');
  inp.disabled = true; inp.classList.add('wrong'); ans.classList.add('show-wrong'); ans.textContent = c[0]; again.push(c);
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
  updateStats();
}

// ---- QUIZ ----
function showQuizCard() {
  const c = deck[current];
  const correct = c[1];
  const others = ALL_CARDS.filter(x => x[1] !== correct).map(x => x[1]);
  const opts = shuffle([correct, ...shuffle(others).slice(0, 3)]);

  document.getElementById('mainArea').innerHTML = `
    <div class="quiz-card"><div class="card-tag">Les ${c[2]}</div>
      <div class="type-prompt">What does this mean?</div><div class="type-word">${c[0]} ${ttsBtn(c[0])}</div>
      <div class="quiz-options">${opts.map((o, i) => `<button class="quiz-opt" onclick="pickQuiz(this,${i},'${escHtml(correct)}')">${o}</button>`).join('')}</div>
    </div>
    <div class="buttons" id="buttons"></div>`;
}
function escHtml(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function pickQuiz(btn, idx, correct) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });
  const isCorrect = btn.textContent === correct;
  if (isCorrect) { btn.classList.remove('dim'); btn.classList.add('correct'); known++; }
  else {
    btn.classList.remove('dim'); btn.classList.add('wrong');
    btns.forEach(b => { if (b.textContent === correct) { b.classList.remove('dim'); b.classList.add('correct'); } });
    again.push(deck[current]);
  }
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
  updateStats();
}

// ---- MATCH ----
function startMatchSession(filtered) {
  if (filtered.length < 5) { showEmpty(); return; }
  matchState = { cards: shuffle([...filtered]), round: 0, totalRounds: Math.ceil(filtered.length / 5), score: 0, total: filtered.length };
  sessionTotal = filtered.length; known = 0;
  showMatchRound();
}
function showMatchRound() {
  const ms = matchState;
  const start = ms.round * 5;
  const batch = ms.cards.slice(start, start + 5);
  if (batch.length === 0) { showDone(); return; }

  const nlItems = shuffle(batch.map((c, i) => ({ text: c[0], id: i, side: 'nl' })));
  const enItems = shuffle(batch.map((c, i) => ({ text: c[1], id: i, side: 'en' })));
  ms.selected = null; ms.matched = 0; ms.batchSize = batch.length;

  const grid = [...nlItems, ...enItems].reduce((acc, item, idx) => {
    const col = idx < nlItems.length ? 0 : 1;
    if (!acc[col]) acc[col] = [];
    acc[col].push(item);
    return acc;
  }, []);

  let html = `<div class="match-area"><div class="match-score">Round ${ms.round + 1} / ${ms.totalRounds}</div><div class="match-grid">`;
  html += '<div>' + grid[0].map(it => `<div class="match-item" data-id="${it.id}" data-side="${it.side}" onclick="pickMatch(this)">${it.text}</div>`).join('') + '</div>';
  html += '<div>' + grid[1].map(it => `<div class="match-item" data-id="${it.id}" data-side="${it.side}" onclick="pickMatch(this)">${it.text}</div>`).join('') + '</div>';
  html += '</div></div>';

  document.getElementById('mainArea').innerHTML = html;
  document.getElementById('stats').innerHTML = `<span>${ms.score} / ${ms.total} matched</span>`;
  document.getElementById('progressFill').style.width = (ms.score / ms.total * 100) + '%';
}
function pickMatch(el) {
  if (el.classList.contains('matched')) return;
  const ms = matchState;
  if (!ms.selected) {
    ms.selected = el; el.classList.add('selected');
  } else {
    const prev = ms.selected;
    if (prev === el) { prev.classList.remove('selected'); ms.selected = null; return; }
    if (prev.dataset.side === el.dataset.side) { prev.classList.remove('selected'); ms.selected = el; el.classList.add('selected'); return; }

    prev.classList.remove('selected');
    if (prev.dataset.id === el.dataset.id) {
      prev.classList.add('matched'); el.classList.add('matched'); ms.matched++; ms.score++; known++;
      document.getElementById('stats').innerHTML = `<span>${ms.score} / ${ms.total} matched</span>`;
      document.getElementById('progressFill').style.width = (ms.score / ms.total * 100) + '%';
      if (ms.matched === ms.batchSize) { ms.round++; setTimeout(() => showMatchRound(), 600); }
    } else {
      prev.classList.add('error'); el.classList.add('error');
      setTimeout(() => { prev.classList.remove('error'); el.classList.remove('error'); }, 500);
    }
    ms.selected = null;
  }
}

// ---- LEARN ----
function showLearnCard() {
  const c = deck[current];
  document.getElementById('mainArea').innerHTML = `
    <div class="learn-card">
      <div class="card-tag">Les ${c[2]}</div>
      <div class="learn-nl">${c[0]} ${ttsBtn(c[0])}</div>
      <div class="learn-en">${c[1]}</div>
      <div class="learn-count">${current + 1} / ${sessionTotal}</div>
    </div>
    <div class="buttons" id="buttons">
      <button class="btn btn-again" onclick="markAgain()">Study again</button>
      <button class="btn btn-good" onclick="markGood()">Got it</button>
    </div>`;
}

// ---- BUILD ----
let buildState = {};
function showBuildCard() {
  const c = deck[current];
  // split Dutch phrase into words
  const words = c[0].split(/\s+/);
  if (words.length < 2) {
    // single word — skip to next or treat as learn
    showLearnCard();
    return;
  }
  const scrambled = shuffle([...words]);
  buildState = { words, placed: [], scrambled };

  document.getElementById('mainArea').innerHTML = `
    <div class="build-card">
      <div class="card-tag">Les ${c[2]}</div>
      <div class="type-prompt">Build the Dutch phrase:</div>
      <div class="build-prompt">${c[1]}</div>
      <div class="build-slots" id="buildSlots"></div>
      <div class="build-words" id="buildWords">
        ${scrambled.map((w, i) => `<button class="build-word" data-idx="${i}" onclick="pickBuildWord(this, ${i})">${w}</button>`).join('')}
      </div>
    </div>
    <div class="buttons" id="buttons"></div>`;
}

function pickBuildWord(btn, idx) {
  const bs = buildState;
  bs.placed.push({ word: bs.scrambled[idx], idx });
  btn.classList.add('used');

  // render placed words in slots
  const slots = document.getElementById('buildSlots');
  slots.innerHTML = bs.placed.map((p, i) =>
    `<span class="build-placed" onclick="removeBuildWord(${i})">${p.word}</span>`
  ).join('');

  // check if complete
  if (bs.placed.length === bs.words.length) {
    const attempt = bs.placed.map(p => p.word).join(' ');
    const correct = bs.words.join(' ');
    if (norm(attempt) === norm(correct)) {
      slots.classList.add('correct');
      known++;
      sayNL(correct);
      document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
    } else {
      slots.classList.add('wrong');
      again.push(deck[current]);
      document.getElementById('buttons').innerHTML = `<div style="text-align:center;margin-bottom:12px;color:#ff3b30;font-weight:600">${correct} ${ttsBtn(correct)}</div><button class="btn btn-next" onclick="current++;showCard()">Next</button>`;
    }
    updateStats();
  }
}

function removeBuildWord(placedIdx) {
  const bs = buildState;
  const removed = bs.placed.splice(placedIdx, 1)[0];
  // un-use the word button
  const btns = document.querySelectorAll('.build-word');
  btns[removed.idx].classList.remove('used');
  // re-render slots
  const slots = document.getElementById('buildSlots');
  slots.innerHTML = bs.placed.map((p, i) =>
    `<span class="build-placed" onclick="removeBuildWord(${i})">${p.word}</span>`
  ).join('');
}

// ---- SPEAK ----
function getAllSpeakTopics() { return [...new Set(SPEAK_CARDS.map(c => c[3]))]; }
function getSpeakFiltered() {
  if (speakTopics.size === 0) return SPEAK_CARDS;
  return SPEAK_CARDS.filter(c => speakTopics.has(c[3]));
}
const TOPIC_LABELS = {persoonlijk:'Persoonlijk',familie:'Familie',wonen:'Wonen',werk:'Werk',school:'School',taal:'Nederlands',nederland:'Nederland',dagelijks:'Dagelijks',reizen:'Reizen',eten:'Eten',boodschappen:'Boodschappen','vrije tijd':'Vrije tijd',feest:'Feest',kleding:'Kleding'};

function showSpeakFilter() {
  let sf = document.getElementById('speakFilter');
  if (!sf) {
    sf = document.createElement('div');
    sf.id = 'speakFilter';
    sf.className = 'speak-filter';
    document.getElementById('lessonFilter').insertAdjacentElement('afterend', sf);
  }
  sf.style.display = 'flex';
  sf.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'speak-filter-btn' + (speakTopics.size === 0 ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { speakTopics.clear(); showSpeakFilter(); startSpeakSession(); };
  sf.appendChild(allBtn);
  getAllSpeakTopics().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'speak-filter-btn' + (speakTopics.has(t) ? ' active' : '');
    btn.textContent = TOPIC_LABELS[t] || t;
    btn.onclick = () => {
      if (speakTopics.has(t)) speakTopics.delete(t); else speakTopics.add(t);
      showSpeakFilter(); startSpeakSession();
    };
    sf.appendChild(btn);
  });
}

function startSpeakSession() {
  const filtered = getSpeakFiltered();
  deck = shuffle(filtered.map(c => [...c]));
  sessionTotal = deck.length;
  current = 0; known = 0; again = []; speakAnswerVisible = false;
  if (deck.length > 0) showSpeakCard(); else showEmpty();
  updateStats();
}

function showSpeakCard() {
  if (current >= deck.length) {
    if (again.length > 0) { deck = shuffle(again); again = []; current = 0; showSpeakCard(); return; }
    showDone(); return;
  }
  const c = deck[current]; speakAnswerVisible = false;
  const topic = TOPIC_LABELS[c[3]] || c[3];
  document.getElementById('mainArea').innerHTML = `
    <div class="speak-card">
      <div class="speak-tag">${topic}</div>
      <div class="speak-q">${c[0]} ${ttsBtn(c[0])}</div>
      <div class="speak-q-en">${c[1]}</div>
      <div class="speak-answer hidden" id="speakAnswer">${c[2]} ${ttsBtn(c[2])}</div>
      <div class="speak-hint" id="speakHint">Say your answer, then check</div>
    </div>
    <div class="buttons" id="buttons">
      <button class="btn btn-show" onclick="showSpeakAnswer()">Show answer</button>
    </div>`;
  updateStats();
}

function showSpeakAnswer() {
  if (speakAnswerVisible) return;
  speakAnswerVisible = true;
  document.getElementById('speakAnswer').classList.remove('hidden');
  document.getElementById('speakHint').textContent = 'Did you get it right?';
  document.getElementById('buttons').innerHTML = '<button class="btn btn-again" onclick="markAgain()">Again</button><button class="btn btn-good" onclick="markGood()">Got it</button>';
}

// ---- COMMON ----
function markGood() { known++; current++; if (mode === 'speak') showSpeakCard(); else showCard(); updateStats(); }
function markAgain() { again.push(deck[current]); current++; if (mode === 'speak') showSpeakCard(); else showCard(); updateStats(); }

buildLessonFilter();
startSession();

document.addEventListener('keydown', e => {
  if (mode === 'type' || mode === 'quiz' || mode === 'match' || mode === 'build') return;
  if (mode === 'learn') {
    if (e.key === '1' || e.key === 'ArrowLeft') markAgain();
    if (e.key === '2' || e.key === 'ArrowRight') markGood();
    return;
  }
  if (mode === 'speak') {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!speakAnswerVisible) showSpeakAnswer(); }
    if (e.key === '1' || e.key === 'ArrowLeft') { if (speakAnswerVisible) markAgain(); }
    if (e.key === '2' || e.key === 'ArrowRight') { if (speakAnswerVisible) markGood(); }
    return;
  }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!isFlipped) flipCard(); }
  if (e.key === '1' || e.key === 'ArrowLeft') { if (isFlipped) markAgain(); }
  if (e.key === '2' || e.key === 'ArrowRight') { if (isFlipped) markGood(); }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'dutch-a1-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', 'flashcards.html', 'icon.svg'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      })));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});
}
</script>
