<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root, [data-theme="dark"] {
    --bg: #181B1F;
    --surface: #242830;
    --surface2: #2E3340;
    --text: #FFFFFF;
    --text2: rgba(255,255,255,0.55);
    --accent: #E5FF5D;
    --accent-text: #181B1F;
    --purple: #CABAF9;
    --purple-strong: #AB7DFF;
    --green: #27C55A;
    --red: #FF5756;
    --border: rgba(255,255,255,0.08);
    --accent-bg: rgba(229,255,93,0.1);
    --accent-border: rgba(229,255,93,0.2);
    --purple-bg: rgba(202,186,249,0.1);
    --green-bg: rgba(39,197,90,0.08);
    --red-bg: rgba(255,87,86,0.08);
    --dashed-border: rgba(255,255,255,0.12);
    --radius: 16px;
    --radius-pill: 9999px;
  }
  [data-theme="light"] {
    --bg: #F5F5F7;
    --surface: #FFFFFF;
    --surface2: #E8E8EC;
    --text: #1D1D1F;
    --text2: rgba(0,0,0,0.55);
    --accent: #AB7DFF;
    --accent-text: #FFFFFF;
    --purple: #7C5AC7;
    --purple-strong: #AB7DFF;
    --green: #0D9344;
    --red: #DC2626;
    --border: rgba(0,0,0,0.12);
    --accent-bg: rgba(171,125,255,0.12);
    --accent-border: rgba(171,125,255,0.3);
    --purple-bg: rgba(124,90,199,0.12);
    --green-bg: rgba(13,147,68,0.1);
    --red-bg: rgba(220,38,38,0.1);
    --dashed-border: rgba(0,0,0,0.15);
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    padding-top: calc(env(safe-area-inset-top, 24px) + 16px);
    padding-bottom: calc(env(safe-area-inset-bottom, 24px) + 100px);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.02em; }

  .stats { font-size: 15px; color: var(--text2); margin-bottom: 14px; text-align: center; }
  .stats span { margin: 0 10px; }
  .progress-bar { width: 100%; max-width: 520px; height: 5px; background: var(--surface2); border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-strong), var(--accent)); border-radius: 3px; transition: width 0.3s; }

  .card-container { perspective: 1000px; width: 100%; max-width: 520px; height: 300px; margin-bottom: 24px; cursor: pointer; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; padding: 32px 24px; background: var(--surface); border: 1px solid var(--border); }
  .card-front { background: var(--surface); }
  .card-back { background: var(--surface); transform: rotateY(180deg); }
  .card-word { font-size: 32px; font-weight: 600; margin-bottom: 10px; text-align: center; line-height: 1.3; letter-spacing: -0.02em; }
  .card-hint { font-size: 15px; color: var(--text2); }
  .card-tag { position: absolute; top: 16px; right: 16px; font-size: 13px; color: var(--purple); background: var(--purple-bg); padding: 5px 12px; border-radius: var(--radius-pill); font-weight: 500; }

  .buttons { display: flex; gap: 12px; width: 100%; max-width: 520px; }
  .btn { flex: 1; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; letter-spacing: -0.01em; }
  .btn:active { transform: scale(0.97); }
  .btn-again { background: var(--red-bg); color: var(--red); border: 1px solid currentColor; }
  .btn-good { background: var(--accent); color: var(--accent-text); }
  .btn-good:active { filter: brightness(0.93); }
  .btn-show { background: var(--purple-strong); color: #fff; }
  .btn-skip { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-next { background: var(--purple-strong); color: #fff; }

  .lesson-filter { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; margin-bottom: 0; justify-content: flex-start; }
  .lesson-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text2); font-family: inherit; min-height: 36px; }
  .lesson-btn.active { border-color: var(--purple-strong); background: var(--purple-bg); color: var(--purple); }

  .mode-toggle { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; margin-bottom: 0; justify-content: flex-start; }
  .mode-btn { padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all 0.2s; white-space: nowrap; font-family: inherit; min-height: 40px; }
  .mode-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

  .done-screen { text-align: center; padding: 48px 20px; }
  .done-screen h2 { font-size: 28px; margin-bottom: 14px; font-weight: 700; letter-spacing: -0.02em; }
  .done-screen p { color: var(--text2); margin-bottom: 28px; font-size: 17px; }
  .done-screen .btn { max-width: 220px; margin: 0 auto; display: block; }
  .score-circle { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, var(--purple-strong), var(--accent)); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; margin: 0 auto 20px; }

  .type-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; margin-bottom: 24px; text-align: center; }
  .type-card .card-tag { position: static; display: inline-block; margin-bottom: 14px; }
  .type-prompt { font-size: 15px; color: var(--text2); margin-bottom: 10px; }
  .type-word { font-size: 30px; font-weight: 600; margin-bottom: 24px; line-height: 1.3; letter-spacing: -0.02em; }
  .type-input { width: 100%; padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 20px; text-align: center; outline: none; transition: border-color 0.2s; font-family: inherit; background: var(--bg); color: var(--text); }
  .type-input:focus { border-color: var(--purple-strong); }
  .type-input.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .type-input.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
  .type-answer { margin-top: 14px; font-size: 20px; font-weight: 600; color: var(--green); min-height: 34px; }
  .type-answer.show-wrong { color: var(--red); }

  /* Quiz mode */
  .quiz-card { position: relative; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; margin-bottom: 24px; text-align: center; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
  .quiz-opt { padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-size: 17px; cursor: pointer; transition: all 0.2s; text-align: left; font-family: inherit; color: var(--text); min-height: 52px; }
  .quiz-opt:active { border-color: var(--purple-strong); background: var(--purple-bg); }
  .quiz-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
  .quiz-opt.dim { opacity: 0.35; }
  .quiz-opt[disabled] { cursor: default; }

  /* Match mode */
  .match-area { width: 100%; max-width: 520px; margin-bottom: 24px; }
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .match-grid > div { display: flex; flex-direction: column; gap: 10px; }
  .match-item { padding: 14px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: 16px; cursor: pointer; transition: all 0.2s; text-align: center; font-family: inherit; min-height: 56px; display: flex; align-items: center; justify-content: center; color: var(--text); }
  .match-item.selected { border-color: var(--purple-strong); background: var(--purple-bg); }
  .match-item.matched { border-color: var(--green); background: var(--green-bg); opacity: 0.5; cursor: default; }
  .match-item.error { border-color: var(--red); background: var(--red-bg); animation: shake 0.4s; }
  .match-score { text-align: center; margin-bottom: 12px; font-size: 15px; color: var(--text2); }
  @keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

  /* TTS button */
  .tts-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 6px 8px; opacity: 0.4; transition: opacity 0.2s; vertical-align: middle; }
  .tts-btn:hover, .tts-btn:active { opacity: 1; }

  /* Learn mode */
  .learn-card { position: relative; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 24px; margin-bottom: 24px; text-align: center; }
  .learn-nl { font-size: 30px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; letter-spacing: -0.02em; }
  .learn-en { font-size: 19px; color: var(--text2); margin-bottom: 6px; line-height: 1.3; }
  .learn-count { font-size: 14px; color: var(--text2); margin-top: 16px; }

  /* Build mode */
  .build-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; margin-bottom: 24px; text-align: center; }
  .build-prompt { font-size: 24px; font-weight: 600; margin-bottom: 24px; line-height: 1.3; letter-spacing: -0.02em; }
  .build-slots { min-height: 56px; border: 2px dashed var(--dashed-border); border-radius: var(--radius); padding: 14px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
  .build-slots.correct { border-color: var(--green); background: var(--green-bg); }
  .build-slots.wrong { border-color: var(--red); background: var(--red-bg); }
  .build-words { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .build-word { padding: 12px 18px; border: 1px solid var(--purple-strong); border-radius: var(--radius-pill); background: var(--purple-bg); font-size: 17px; cursor: pointer; transition: all 0.2s; font-family: inherit; color: var(--purple); min-height: 46px; }
  .build-word:active { background: var(--purple-strong); color: #fff; }
  .build-word.used { opacity: 0.15; pointer-events: none; }
  .build-placed { padding: 12px 18px; border: 1px solid var(--purple-strong); border-radius: var(--radius-pill); background: var(--purple-strong); color: #fff; font-size: 17px; cursor: pointer; transition: all 0.2s; }

  /* Speak mode */
  .speak-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; margin-bottom: 24px; text-align: center; }
  .speak-tag { font-size: 13px; color: var(--purple); background: var(--purple-bg); padding: 6px 14px; border-radius: var(--radius-pill); display: inline-block; margin-bottom: 14px; font-weight: 500; }
  .speak-q { font-size: 24px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; letter-spacing: -0.02em; }
  .speak-q-en { font-size: 16px; color: var(--text2); margin-bottom: 24px; line-height: 1.4; }
  .speak-answer { font-size: 20px; color: var(--green); font-weight: 500; min-height: 64px; display: flex; align-items: center; justify-content: center; line-height: 1.4; padding: 16px; border-top: 1px solid var(--border); }
  .speak-answer.hidden { color: transparent; user-select: none; }
  .speak-hint { font-size: 14px; color: var(--text2); margin-top: 10px; }
  .speak-filter { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; margin-bottom: 0; margin-top: 16px; justify-content: flex-start; }
  .speak-filter-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text2); font-family: inherit; min-height: 36px; }
  .speak-filter-btn.active { border-color: var(--purple-strong); background: var(--purple-bg); color: var(--purple); }

  /* KNS mode */
  .kns-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; text-align: center; }
  .kns-tag { font-size: 13px; color: var(--purple); background: var(--purple-bg); padding: 5px 12px; border-radius: var(--radius-pill); font-weight: 500; display: inline-block; margin-bottom: 12px; }
  .kns-photo-num { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .kns-photo { width: 100%; max-width: 360px; border-radius: 12px; margin: 0 auto 16px; display: block; border: 1px solid var(--border); }
  .kns-question { font-size: 19px; font-weight: 500; line-height: 1.5; margin-bottom: 24px; color: var(--text); }
  .kns-options { display: flex; flex-direction: column; gap: 12px; }
  .kns-option { display: flex; align-items: center; gap: 14px; padding: 18px 20px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: left; }
  .kns-option:active { transform: scale(0.98); }
  .kns-option:hover { border-color: var(--accent-border); background: var(--accent-bg); }
  .kns-letter { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .kns-option.kns-correct { border-color: var(--green); background: var(--green-bg); }
  .kns-option.kns-correct .kns-letter { background: var(--green); color: #fff; }
  .kns-option.kns-wrong { border-color: var(--red); background: var(--red-bg); }
  .kns-option.kns-wrong .kns-letter { background: var(--red); color: #fff; }
  .kns-option:disabled { cursor: default; transform: none; }
  .kns-option:disabled:hover { border-color: var(--border); background: var(--surface); }
  .kns-option.kns-correct:disabled:hover { border-color: var(--green); background: var(--green-bg); }
  .kns-option.kns-wrong:disabled:hover { border-color: var(--red); background: var(--red-bg); }
  .kns-result { margin-top: 16px; font-size: 16px; font-weight: 600; }
  .kns-ok { color: var(--green); }
  .kns-nope { color: var(--red); }

  /* Stats screen */
  .stats-screen { width: 100%; max-width: 520px; }
  .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .stats-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .stats-close { background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-size: 15px; padding: 8px 16px; border-radius: var(--radius-pill); cursor: pointer; font-family: inherit; font-weight: 500; }
  .stats-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stats-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 14px; text-align: center; }
  .stats-box .num { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .stats-box .num.accent { color: var(--accent); }
  .stats-box .num.purple { color: var(--purple); }
  .stats-box .num.green { color: var(--green); }
  .stats-box .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .lesson-progress { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; }
  .lesson-progress .lp-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
  .lesson-progress .lp-label { font-weight: 600; }
  .lesson-progress .lp-count { color: var(--text2); font-size: 13px; }
  .lp-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .lp-fill { height: 100%; background: linear-gradient(90deg, var(--purple-strong), var(--accent)); border-radius: 3px; transition: width 0.3s; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .sync-dot.on { background: var(--green); }
  .sync-dot.off { background: var(--text2); }
  .stats-reset { background: var(--red-bg); border: 1px solid currentColor; color: var(--red); font-size: 14px; padding: 12px 20px; border-radius: var(--radius); cursor: pointer; font-family: inherit; font-weight: 500; margin-top: 16px; width: 100%; }

  /* Top bar */
  .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 520px; margin-bottom: 16px; }
  .top-bar h1 { margin: 0; font-size: 22px; }
  .top-bar-actions { display: flex; gap: 8px; }
  .top-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-size: 18px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: inherit; }
  .top-icon:active { background: var(--surface2); }
  .top-icon.open { border-color: var(--purple-strong); color: var(--purple); background: var(--purple-bg); }

  /* Active mode pill (shown in top bar) */
  .active-mode-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-bg); border: 1px solid var(--accent-border); color: var(--accent); font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-pill); cursor: pointer; font-family: inherit; }
  .active-mode-pill:active { opacity: 0.8; }

  /* Settings drawer */
  .settings-drawer { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; display: none; }
  .settings-drawer.open { display: block; }
  .settings-section { margin-bottom: 16px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

  /* Welcome/login screen */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; min-height: 80dvh; width: 100%; max-width: 400px; text-align: center; }
  .welcome-icon { font-size: 64px; margin-bottom: 20px; }
  .welcome h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .welcome p { color: var(--text2); font-size: 16px; line-height: 1.5; margin-bottom: 32px; }
  .welcome-input { width: 100%; padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 18px; text-align: center; font-family: inherit; outline: none; margin-bottom: 14px; }
  .welcome-input:focus { border-color: var(--purple-strong); }
  .welcome-input::placeholder { color: var(--text2); }
  .welcome-btn { width: 100%; padding: 18px; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-bottom: 10px; }
  .welcome-btn:active { transform: scale(0.97); }
  .welcome-btn.primary { background: var(--accent); color: var(--accent-text); }
  .welcome-btn.secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
  #appWrap { flex-direction: column; align-items: center; width: 100%; }

  /* Tab bar */
  .tab-bar { position: fixed; bottom: calc(12px + env(safe-area-inset-bottom, 0px)); left: 12px; right: 12px; display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 10px 4px; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 0; font-family: inherit; transition: color 0.2s; -webkit-tap-highlight-color: transparent; min-width: 0; }
  .tab.active { color: var(--accent); }
  .tab-emoji { font-size: 20px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 600; }

  .learn-example { font-size: 14px; color: var(--text2); margin-top: 12px; font-style: italic; line-height: 1.5; }
  .learn-hint { font-size: 12px; color: var(--purple); background: var(--purple-bg); padding: 8px 14px; border-radius: 10px; margin-top: 10px; line-height: 1.5; text-align: left; }

  /* KNS top filter (outside drawer) */
  .kns-top-filter { display: none; width: 100%; max-width: 520px; margin-bottom: 16px; }
</style>

let nlVoice = null;
function initVoices() {
  const voices = speechSynthesis.getVoices();
  nlVoice = voices.find(v => v.lang === 'nl-NL') || voices.find(v => v.lang.startsWith('nl')) || null;
}
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function sayNL(text) {
  speechSynthesis.cancel();
  // strip parenthetical numbers like (100)
  const clean = text.replace(/\(\d+\)/g, '').trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'nl-NL';
  u.rate = 0.7;
  if (nlVoice) u.voice = nlVoice;
  speechSynthesis.speak(u);
}
function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();sayNL('${text.replace(/'/g,"\\'")}')" title="Listen">&#128264;</button>`;
}

async function supaFetch(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SUPA_URL + '/rest/v1' + path, opts);
    if (!r.ok) return null;
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  } catch(e) { return null; }
}

async function cloudPull() {
  if (!syncUser) return;
  const rows = await supaFetch('GET', `/progress?id=eq.${encodeURIComponent(syncUser)}&select=data`);
  if (rows && rows.length > 0 && rows[0].data) {
    // Merge: keep the best streak for each card
    const local = loadProgress();
    const cloud = rows[0].data;
    const merged = { ...local };
    for (const k in cloud) {
      if (!merged[k] || cloud[k].correct > merged[k].correct || cloud[k].total > merged[k].total) {
        merged[k] = cloud[k];
      }
    }
    localStorage.setItem('dutch-a1-progress', JSON.stringify(merged));
  }
}

async function cloudPush() {
  if (!syncUser) return;
  const data = loadProgress();
  await supaFetch('POST', '/progress', { id: syncUser, data, updated_at: new Date().toISOString() });
}

function schedulePush() {
  if (!syncUser) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(cloudPush, 3000); // debounce 3s
}

function setSyncUser(name) {
  syncUser = name.trim().toLowerCase();
  localStorage.setItem('dutch-a1-user', syncUser);
  if (syncUser) cloudPull().then(() => { if (mode) setMode(mode); });
}

// ---- PROGRESS TRACKING ----
const MASTERED_THRESHOLD = 3;
function cardKey(c) { return c[0] + '|' + c[2]; }
function speakKey(c) { return 'sp|' + c[0]; }
function knsKey(c) { return 'kns|' + c[0]; }

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('dutch-a1-progress') || '{}'); } catch(e) { return {}; }
}
function saveProgress(p) { localStorage.setItem('dutch-a1-progress', JSON.stringify(p)); schedulePush(); }

function recordCorrect(c, isSpeakCard) {
  const p = loadProgress();
  const k = isSpeakCard === 'kns' ? knsKey(c) : isSpeakCard ? speakKey(c) : cardKey(c);
  if (!p[k]) p[k] = { correct: 0, total: 0 };
  p[k].correct++;
  p[k].total++;
  p[k].lastDate = new Date().toISOString().slice(0, 10);
  saveProgress(p);
}
function recordWrong(c, isSpeakCard) {
  const p = loadProgress();
  const k = isSpeakCard === 'kns' ? knsKey(c) : isSpeakCard ? speakKey(c) : cardKey(c);
  if (!p[k]) p[k] = { correct: 0, total: 0 };
  p[k].correct = 0; // reset streak
  p[k].total++;
  p[k].lastDate = new Date().toISOString().slice(0, 10);
  saveProgress(p);
}
function isMastered(c, isSpeakCard) {
  const p = loadProgress();
  const k = isSpeakCard === 'kns' ? knsKey(c) : isSpeakCard ? speakKey(c) : cardKey(c);
  return p[k] && p[k].correct >= MASTERED_THRESHOLD;
}

function getLessonStats() {
  const p = loadProgress();
  const lessons = getAllLessons();
  const stats = {};
  lessons.forEach(l => {
    const cards = ALL_CARDS.filter(c => c[2] === l);
    const mastered = cards.filter(c => { const d = p[cardKey(c)]; return d && d.correct >= MASTERED_THRESHOLD; }).length;
    stats[l] = { total: cards.length, mastered };
  });
  return stats;
}

function getTotalStats() {
  const p = loadProgress();
  const allKeys = Object.keys(p);
  const mastered = allKeys.filter(k => p[k].correct >= MASTERED_THRESHOLD).length;
  const today = new Date().toISOString().slice(0, 10);
  const todayReviewed = allKeys.filter(k => p[k].lastDate === today).length;
  return { total: ALL_CARDS.length + SPEAK_CARDS.length + KNS_CARDS.length, mastered, reviewed: allKeys.length, todayReviewed };
}

function switchTab(tab) {
  // Save current tab's lesson selection before switching
  if (activeTab === 'vocab' || activeTab === 'words') {
    tabLessonsState[activeTab] = [...activeLessons];
  }
  activeTab = tab;
  saveAppState();

  // Update tab bar active state
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabId = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(tabId).classList.add('active');

  // Get elements
  const topBar = document.querySelector('.top-bar');
  const drawer = document.getElementById('settingsDrawer');
  const statsEl = document.getElementById('stats');
  const progressBar = document.querySelector('.progress-bar');
  const mainArea = document.getElementById('mainArea');
  const modePill = document.getElementById('modePill');
  const knsTopFilter = document.getElementById('knsTopFilter');
  const speakTopFilter = document.getElementById('speakTopFilter');

  // Reset all
  topBar.style.display = 'flex';
  drawer.classList.remove('open');
  statsEl.style.display = '';
  progressBar.style.display = '';
  knsTopFilter.style.display = 'none';
  speakTopFilter.style.display = 'none';

  if (tab === 'vocab') {
    document.querySelector('.top-bar h1').textContent = 'Dutch A1';
    modePill.style.display = '';
    drawer.style.display = '';
    if (mode === 'kns' || mode === 'speak') mode = 'learn';
    buildLessonFilterForTab('vocab');
    setMode(mode);
  } else if (tab === 'words') {
    document.querySelector('.top-bar h1').textContent = 'Basics';
    modePill.style.display = '';
    drawer.style.display = '';
    if (mode === 'kns' || mode === 'speak') mode = 'learn';
    buildLessonFilterForTab('words');
    setMode(mode);
  } else if (tab === 'speak') {
    drawer.style.display = 'none';
    modePill.style.display = 'none';
    document.querySelector('.top-bar h1').textContent = 'Speak';
    speakTopFilter.style.display = 'block';
    mode = 'speak';
    showSpeakFilter();
    startSpeakSession();
  } else if (tab === 'kns') {
    drawer.style.display = 'none';
    modePill.style.display = 'none';
    document.querySelector('.top-bar h1').textContent = 'KNS Fotoboek';
    knsTopFilter.style.display = 'block';
    mode = 'kns';
    showKnsFilter();
    startKnsSession();
  } else if (tab === 'stats') {
    drawer.style.display = 'none';
    modePill.style.display = 'none';
    statsEl.style.display = 'none';
    progressBar.style.display = 'none';
    document.querySelector('.top-bar h1').textContent = 'Stats';
    mainArea.innerHTML = getStatsHTML();
  }
}

function loadAppState() {
  try {
    const s = JSON.parse(localStorage.getItem('dutch-a1-state'));
    if (!s) return;
    if (s.tab) activeTab = s.tab;
    if (s.mode) mode = s.mode;
    if (s.direction) direction = s.direction;
    if (s.vocabLessons) tabLessonsState.vocab = s.vocabLessons;
    if (s.wordsLessons) tabLessonsState.words = s.wordsLessons;
  } catch(e) {}
}

function buildLessonFilterForTab(tab) {
  const c = document.getElementById('lessonFilter');
  c.innerHTML = '';
  const isNumeric = l => !isNaN(+l);
  const lessons = getAllLessons().filter(l => tab === 'words' ? !isNumeric(l) : isNumeric(l));

  // Restore saved selection or select all
  activeLessons.clear();
  if (tabLessonsState[tab] && tabLessonsState[tab].length > 0) {
    tabLessonsState[tab].forEach(l => { if (lessons.includes(l)) activeLessons.add(l); });
  }
  if (activeLessons.size === 0) lessons.forEach(l => activeLessons.add(l));

  const allBtn = document.createElement('button');
  allBtn.className = 'lesson-btn' + (lessons.every(l => activeLessons.has(l)) ? ' active' : '');
  allBtn.textContent = 'All'; allBtn.id = 'allBtn';
  allBtn.onclick = () => {
    const tabLessons = getAllLessons().filter(l => tab === 'words' ? !isNumeric(l) : isNumeric(l));
    const allActive = tabLessons.every(l => activeLessons.has(l));
    if (allActive) { activeLessons.clear(); } else { tabLessons.forEach(l => activeLessons.add(l)); }
    saveTabLessons(tab); syncFilterUI(); startSession();
  };
  c.appendChild(allBtn);

  lessons.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (activeLessons.has(l) ? ' active' : '');
    btn.textContent = LESSON_TAG[l] || l; btn.dataset.les = l;
    btn.onclick = () => {
      if (activeLessons.has(l)) activeLessons.delete(l); else activeLessons.add(l);
      saveTabLessons(tab); syncFilterUI(); startSession();
    };
    c.appendChild(btn);
  });
}

function buildLessonFilter() {
  buildLessonFilterForTab('vocab');
}

function syncFilterUI() {
  const isNumeric = l => !isNaN(+l);
  const tabLessons = getAllLessons().filter(l => activeTab === 'words' ? !isNumeric(l) : isNumeric(l));
  document.querySelectorAll('.lesson-btn').forEach(btn => {
    if (btn.id === 'allBtn') {
      btn.classList.toggle('active', tabLessons.every(l => activeLessons.has(l)));
    } else {
      btn.classList.toggle('active', activeLessons.has(btn.dataset.les));
    }
  });
}

const MODE_LABELS = {learn:'Learn',build:'Build',fill:'Fill',type:'Type',quiz:'Quiz',match:'Match',write:'Write',kns:'KNS'};
const MODE_FLOW = ['learn','build','fill','type','quiz','match','write'];
let direction = 'nl'; // 'nl' = NL→EN, 'en' = EN→NL

function setDirection(dir) {
  direction = dir;
  saveAppState();
  document.getElementById('dirNl').classList.toggle('active', dir === 'nl');
  document.getElementById('dirEn').classList.toggle('active', dir === 'en');
}

function getNextMode() {
  const idx = MODE_FLOW.indexOf(mode);
  if (idx < 0 || idx >= MODE_FLOW.length - 1) return null;
  return MODE_FLOW[idx + 1];
}

function goToMode(m) {
  setMode(m);
}

function toggleSettings() {
  if (activeTab !== 'vocab' && activeTab !== 'words') return;
  const d = document.getElementById('settingsDrawer');
  d.classList.toggle('open');
  document.getElementById('modePill').innerHTML = (MODE_LABELS[mode] || mode) + (d.classList.contains('open') ? ' &#9652;' : ' &#9662;');
}

function setMode(m) {
  mode = m;
  saveAppState();
  const modes = MODE_FLOW;
  const modeToggle = document.getElementById('modeToggle');
  modeToggle.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', modes[i] === m);
  });
  document.getElementById('modePill').innerHTML = (MODE_LABELS[m] || m) + ' &#9662;';
  document.getElementById('settingsDrawer').classList.remove('open');

  startSession();
}

function startSession() {
  const filtered = getFiltered();
  if (mode === 'match') {
    startMatchSession(filtered);
    return;
  }
  deck = shuffle(filtered.map(c => [...c]));
  sessionTotal = deck.length;
  current = 0; known = 0; again = []; isFlipped = false; typeState = 'input';
  if (deck.length > 0) showCard(); else showEmpty();
  updateStats();
}

function showCard() {
  if (current >= deck.length) {
    if (again.length > 0) { deck = shuffle(again); again = []; current = 0; showCard(); return; }
    showDone(); return;
  }
  if (mode === 'learn') showLearnCard();
  else if (mode === 'build') showBuildCard();
  else if (mode === 'fill') showFillCard();
  else if (mode === 'type') showTypeCard();
  else if (mode === 'quiz') showQuizCard();
  else if (mode === 'write') showWriteCard();
  else showLearnCard();
  updateStats();
}

function updateStats() {
  const rem = (deck.length - current) + again.length;
  document.getElementById('stats').innerHTML = `<span>${rem} left</span><span>${known} learned</span>`;
  const pct = sessionTotal > 0 ? (known / sessionTotal) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function getNextLesson() {
  if (activeLessons.size !== 1) return null;
  const currentLesson = [...activeLessons][0];
  const isNumeric = l => !isNaN(+l);
  const tabLessons = getAllLessons().filter(l => activeTab === 'words' ? !isNumeric(l) : isNumeric(l));
  const idx = tabLessons.indexOf(currentLesson);
  if (idx < 0 || idx >= tabLessons.length - 1) return null;
  return tabLessons[idx + 1];
}

function goToLesson(lesson) {
  activeLessons.clear();
  activeLessons.add(lesson);
  syncFilterUI();
  setMode('learn'); // start new lesson from Learn mode
}

function showDone() {
  const pct = sessionTotal > 0 ? Math.round((known / sessionTotal) * 100) : 0;
  const againFn = mode === 'speak' ? 'startSpeakSession()' : mode === 'kns' ? 'startKnsSession()' : 'startSession()';
  const isCardMode = mode !== 'speak' && mode !== 'kns';
  const nextMode = isCardMode ? getNextMode() : null;
  const nextLes = isCardMode && !nextMode ? getNextLesson() : null;

  let buttons = '';
  if (nextMode && pct === 100) {
    // Completed mode at 100% → advance to next mode
    buttons = `<button class="btn btn-good" onclick="goToMode('${nextMode}')">Next → ${MODE_LABELS[nextMode]}</button>
      <button class="btn btn-skip" onclick="${againFn}" style="margin-top:10px">Again</button>`;
  } else if (nextMode) {
    buttons = `<button class="btn btn-good" onclick="${againFn}">Again</button>
      <button class="btn btn-skip" onclick="goToMode('${nextMode}')" style="margin-top:10px">Skip → ${MODE_LABELS[nextMode]}</button>`;
  } else if (nextLes && pct === 100) {
    // Last mode completed at 100% → advance to next lesson
    buttons = `<button class="btn btn-good" onclick="goToLesson('${nextLes}')">Next → ${lesTag(nextLes)}</button>
      <button class="btn btn-skip" onclick="${againFn}" style="margin-top:10px">Again</button>`;
  } else if (nextLes) {
    buttons = `<button class="btn btn-good" onclick="${againFn}">Again</button>
      <button class="btn btn-skip" onclick="goToLesson('${nextLes}')" style="margin-top:10px">Skip → ${lesTag(nextLes)}</button>`;
  } else {
    buttons = `<button class="btn btn-good" onclick="${againFn}">Again</button>`;
  }

  document.getElementById('mainArea').innerHTML = `<div class="done-screen"><div class="score-circle">${pct}%</div><h2>Done!</h2><p>${known} / ${sessionTotal} learned</p>${buttons}</div>`;
}

function showEmpty() {
  document.getElementById('mainArea').innerHTML = '<div class="done-screen"><p>Select lessons above</p></div>';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
}

function escHtml(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function pickQuiz(btn, idx, correct) {

// ---- FILL (fill the gap) ----
function showFillCard() {
  const c = deck[current];
  const ex = EXAMPLES[c[0]];
  // Skip cards without examples
  if (!ex) { recordCorrect(c, false); known++; current++; showCard(); return; }
  const sentence = ex[0];
  const word = c[0];
  // Find the word in the sentence (case-insensitive, match conjugated forms too)
  const words = sentence.replace(/[.!?,]/g,'').split(/\s+/);
  const wordLower = word.toLowerCase().split(' / ')[0].split(' ')[0]; // handle "jij / je" → "jij"
  let gapWord = null;
  for (const w of words) {
    if (w.toLowerCase() === wordLower || norm(w) === norm(wordLower)) { gapWord = w; break; }
  }
  // Try partial match for conjugated verbs
  if (!gapWord) {
    for (const w of words) {
      if (w.toLowerCase().startsWith(wordLower.substring(0,3)) && w.length >= 2) { gapWord = w; break; }
    }
  }
  if (!gapWord) { recordCorrect(c, false); known++; current++; showCard(); return; }

  const gapSentence = sentence.replace(new RegExp('\\b' + gapWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'i'), '___');

  // Get distractors from same lesson
  const sameLesson = ALL_CARDS.filter(x => x[2] === c[2] && x[0] !== c[0]);
  const distractorWords = shuffle(sameLesson).slice(0, 3).map(x => {
    const dw = x[0].split(' / ')[0].split(' ')[0];
    return dw;
  });
  // If not enough distractors, pad with random basics
  while (distractorWords.length < 3) {
    const rnd = ALL_CARDS[Math.floor(Math.random() * ALL_CARDS.length)];
    const rw = rnd[0].split(' / ')[0].split(' ')[0];
    if (rw !== wordLower && !distractorWords.includes(rw)) distractorWords.push(rw);
  }

  const opts = shuffle([gapWord, ...distractorWords.slice(0,3)]);

  document.getElementById('mainArea').innerHTML = `
    <div class="quiz-card"><div class="card-tag">${lesTag(c[2])}</div>
      <div class="type-prompt">Fill in the gap:</div>
      <div class="type-word" style="font-size:22px;line-height:1.6">${gapSentence}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${ex[1]}</div>
      <div class="quiz-options">${opts.map(o => `<button class="quiz-opt" onclick="pickFill(this,'${escHtml(gapWord)}')">${o}</button>`).join('')}</div>
    </div>
    <div class="buttons" id="buttons"></div>`;
}

function pickFill(btn, correct) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });
  const isCorrect = btn.textContent === correct;
  const c = deck[current];
  if (isCorrect) {
    btn.classList.remove('dim'); btn.classList.add('correct'); known++; recordCorrect(c, false);
    updateStats(); setTimeout(() => { current++; showCard(); }, 1200); return;
  }
  btn.classList.remove('dim'); btn.classList.add('wrong');
  btns.forEach(b => { if (b.textContent === correct) { b.classList.remove('dim'); b.classList.add('correct'); } });
  again.push(c); recordWrong(c, false);
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
  updateStats();
}

// ---- MATCH ----
function startMatchSession(filtered) {
  if (filtered.length < 5) { showEmpty(); return; }
  matchState = { cards: shuffle([...filtered]), round: 0, totalRounds: Math.ceil(filtered.length / 5), score: 0, total: filtered.length };
  sessionTotal = filtered.length; known = 0;
  showMatchRound();
}
function showMatchRound() {
  const ms = matchState;
  const start = ms.round * 5;
  const batch = ms.cards.slice(start, start + 5);
  if (batch.length === 0) { showDone(); return; }

  const nlItems = shuffle(batch.map((c, i) => ({ text: c[0], id: i, side: 'nl' })));
  const enItems = shuffle(batch.map((c, i) => ({ text: c[1], id: i, side: 'en' })));
  ms.selected = null; ms.matched = 0; ms.batchSize = batch.length;

  const grid = [...nlItems, ...enItems].reduce((acc, item, idx) => {
    const col = idx < nlItems.length ? 0 : 1;
    if (!acc[col]) acc[col] = [];
    acc[col].push(item);
    return acc;
  }, []);

  let html = `<div class="match-area"><div class="match-score">Round ${ms.round + 1} / ${ms.totalRounds}</div><div class="match-grid">`;
  html += '<div>' + grid[0].map(it => `<div class="match-item" data-id="${it.id}" data-side="${it.side}" onclick="pickMatch(this)">${it.text}</div>`).join('') + '</div>';
  html += '<div>' + grid[1].map(it => `<div class="match-item" data-id="${it.id}" data-side="${it.side}" onclick="pickMatch(this)">${it.text}</div>`).join('') + '</div>';
  html += '</div></div>';

  document.getElementById('mainArea').innerHTML = html;
  document.getElementById('stats').innerHTML = `<span>${ms.score} / ${ms.total} matched</span>`;
  document.getElementById('progressFill').style.width = (ms.score / ms.total * 100) + '%';
}
function pickMatch(el) {
  if (el.classList.contains('matched')) return;
  const ms = matchState;
  if (!ms.selected) {
    ms.selected = el; el.classList.add('selected');
  } else {
    const prev = ms.selected;
    if (prev === el) { prev.classList.remove('selected'); ms.selected = null; return; }
    if (prev.dataset.side === el.dataset.side) { prev.classList.remove('selected'); ms.selected = el; el.classList.add('selected'); return; }

    prev.classList.remove('selected');
    if (prev.dataset.id === el.dataset.id) {
      prev.classList.add('matched'); el.classList.add('matched'); ms.matched++; ms.score++; known++;
      document.getElementById('stats').innerHTML = `<span>${ms.score} / ${ms.total} matched</span>`;
      document.getElementById('progressFill').style.width = (ms.score / ms.total * 100) + '%';
      if (ms.matched === ms.batchSize) { ms.round++; setTimeout(() => showMatchRound(), 600); }
    } else {
      prev.classList.add('error'); el.classList.add('error');
      setTimeout(() => { prev.classList.remove('error'); el.classList.remove('error'); }, 500);
    }
    ms.selected = null;
  }
}

// ---- BUILD ----
let buildState = {};
function showBuildCard() {
  const c = deck[current];
  // split Dutch phrase into words
  const words = c[0].split(/\s+/);
  if (words.length < 2) {
    // single word — skip to next or treat as learn
    showLearnCard();
    return;
  }
  const scrambled = shuffle([...words]);
  buildState = { words, placed: [], scrambled };

  document.getElementById('mainArea').innerHTML = `
    <div class="build-card">
      <div class="card-tag">${lesTag(c[2])}</div>
      <div class="type-prompt">Build the Dutch phrase:</div>
      <div class="build-prompt">${c[1]}</div>
      <div class="build-slots" id="buildSlots"></div>
      <div class="build-words" id="buildWords">
        ${scrambled.map((w, i) => `<button class="build-word" data-idx="${i}" onclick="pickBuildWord(this, ${i})">${w}</button>`).join('')}
      </div>
    </div>
    <div class="buttons" id="buttons"></div>`;
}

function pickBuildWord(btn, idx) {
  const bs = buildState;
  bs.placed.push({ word: bs.scrambled[idx], idx });
  btn.classList.add('used');

  // render placed words in slots
  const slots = document.getElementById('buildSlots');
  slots.innerHTML = bs.placed.map((p, i) =>
    `<span class="build-placed" onclick="removeBuildWord(${i})">${p.word}</span>`
  ).join('');

  // check if complete
  if (bs.placed.length === bs.words.length) {
    const attempt = bs.placed.map(p => p.word).join(' ');
    const correct = bs.words.join(' ');
    if (norm(attempt) === norm(correct)) {
      slots.classList.add('correct');
      known++;
      recordCorrect(deck[current], false);
      sayNL(correct);
      document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showCard()">Next</button>';
    } else {
      slots.classList.add('wrong');
      again.push(deck[current]); recordWrong(deck[current], false);
      document.getElementById('buttons').innerHTML = `<div style="text-align:center;margin-bottom:12px;color:#ff3b30;font-weight:600">${correct} ${ttsBtn(correct)}</div><button class="btn btn-next" onclick="current++;showCard()">Next</button>`;
    }
    updateStats();
  }
}

function removeBuildWord(placedIdx) {
  const bs = buildState;
  const removed = bs.placed.splice(placedIdx, 1)[0];
  // un-use the word button
  const btns = document.querySelectorAll('.build-word');
  btns[removed.idx].classList.remove('used');
  // re-render slots
  const slots = document.getElementById('buildSlots');
  slots.innerHTML = bs.placed.map((p, i) =>
    `<span class="build-placed" onclick="removeBuildWord(${i})">${p.word}</span>`
  ).join('');
}

// ---- SPEAK ----
function getAllSpeakTopics() { return [...new Set(SPEAK_CARDS.map(c => c[3]))]; }
function getSpeakFiltered() {
  if (speakTopics.size === 0) return SPEAK_CARDS;
  return SPEAK_CARDS.filter(c => speakTopics.has(c[3]));
}
const TOPIC_LABELS = {persoonlijk:'Persoonlijk',familie:'Familie',wonen:'Wonen',werk:'Werk',school:'School',taal:'Nederlands',nederland:'Nederland',dagelijks:'Dagelijks',reizen:'Reizen',eten:'Eten',boodschappen:'Boodschappen','vrije tijd':'Vrije tijd',feest:'Feest',kleding:'Kleding'};

function showSpeakFilter() {
  const container = document.getElementById('speakTopFilter');

  // Say/Write mode toggle
  let mt = document.getElementById('speakModeToggle');
  if (!mt) {
    mt = document.createElement('div');
    mt.id = 'speakModeToggle';
    mt.className = 'mode-toggle';
    mt.style.marginBottom = '10px';
    container.appendChild(mt);
  }
  mt.innerHTML = '';
  ['say','write'].forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (speakMode === m ? ' active' : '');
    btn.textContent = m === 'say' ? 'Say' : 'Write';
    btn.onclick = () => { speakMode = m; showSpeakFilter(); startSpeakSession(); };
    mt.appendChild(btn);
  });

  // Topic filter
  let sf = document.getElementById('speakFilter');
  if (!sf) {
    sf = document.createElement('div');
    sf.id = 'speakFilter';
    sf.className = 'speak-filter';
  }
  if (sf.parentElement !== container) container.appendChild(sf);
  sf.style.display = 'flex';
  sf.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'speak-filter-btn' + (speakTopics.size === 0 ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { speakTopics.clear(); showSpeakFilter(); startSpeakSession(); };
  sf.appendChild(allBtn);
  getAllSpeakTopics().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'speak-filter-btn' + (speakTopics.has(t) ? ' active' : '');
    btn.textContent = TOPIC_LABELS[t] || t;
    btn.onclick = () => {
      if (speakTopics.has(t)) speakTopics.delete(t); else speakTopics.add(t);
      showSpeakFilter(); startSpeakSession();
    };
    sf.appendChild(btn);
  });
}

function startSpeakSession() {
  const filtered = getSpeakFiltered();
  deck = shuffle(filtered.map(c => [...c]));
  sessionTotal = deck.length;
  current = 0; known = 0; again = []; speakAnswerVisible = false;
  if (deck.length > 0) showSpeakCard(); else showEmpty();
  updateStats();
}

function showSpeakCard() {
  if (current >= deck.length) {
    if (again.length > 0) { deck = shuffle(again); again = []; current = 0; showSpeakCard(); return; }
    showDone(); return;
  }
  if (speakMode === 'write') { showSpeakWriteCard(); return; }
  const c = deck[current]; speakAnswerVisible = false;
  const topic = TOPIC_LABELS[c[3]] || c[3];
  document.getElementById('mainArea').innerHTML = `
    <div class="speak-card">
      <div class="speak-tag">${topic}</div>
      <div class="speak-q">${c[0]} ${ttsBtn(c[0])}</div>
      <div class="speak-q-en">${c[1]}</div>
      <div class="speak-answer hidden" id="speakAnswer">${c[2]} ${ttsBtn(c[2])}</div>
      <div class="speak-hint" id="speakHint">Say your answer, then check</div>
    </div>
    <div class="buttons" id="buttons">
      <button class="btn btn-show" onclick="showSpeakAnswer()">Show answer</button>
    </div>`;
  updateStats();
}

function showSpeakWriteCard() {
  const c = deck[current];
  const topic = TOPIC_LABELS[c[3]] || c[3];
  document.getElementById('mainArea').innerHTML = `
    <div class="type-card">
      <div class="card-tag">${topic}</div>
      <div class="type-prompt">${c[0]} ${ttsBtn(c[0])}</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:16px">${c[1]}</div>
      <input type="text" class="type-input" id="speakWriteInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type your answer in Dutch..." />
      <div class="type-answer" id="speakWriteAnswer"></div>
    </div>
    <div class="buttons" id="buttons">
      <button class="btn btn-show" onclick="checkSpeakWrite()">Check</button>
      <button class="btn btn-skip" onclick="skipSpeakWrite()">Show answer</button>
    </div>`;
  setTimeout(() => {
    const inp = document.getElementById('speakWriteInput');
    if (inp) { inp.focus(); inp.onkeydown = e => { if (e.key==='Enter'){e.preventDefault(); if(!inp.disabled)checkSpeakWrite();else{current++;showSpeakCard();}} }; }
  }, 50);
  updateStats();
}

function checkSpeakWrite() {
  const c = deck[current];
  const expected = c[2].replace(/[.!?]$/,'');
  const inp = document.getElementById('speakWriteInput');
  const ans = document.getElementById('speakWriteAnswer');
  if (inp.disabled) return;
  inp.disabled = true;
  if (normSentence(inp.value) === normSentence(expected)) {
    inp.classList.add('correct'); ans.innerHTML = 'Correct! ' + ttsBtn(expected);
    known++; recordCorrect(c, true);
    updateStats(); setTimeout(() => { current++; showSpeakCard(); }, 1800); return;
  }
  inp.classList.add('wrong'); ans.classList.add('show-wrong');
  ans.innerHTML = c[2] + ' ' + ttsBtn(expected);
  again.push(c); recordWrong(c, true);
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showSpeakCard()">Next</button>';
  updateStats();
}

function skipSpeakWrite() {
  const c = deck[current];
  const inp = document.getElementById('speakWriteInput');
  const ans = document.getElementById('speakWriteAnswer');
  inp.disabled = true; inp.classList.add('wrong'); ans.classList.add('show-wrong');
  ans.innerHTML = c[2] + ' ' + ttsBtn(c[2].replace(/[.!?]$/,''));
  again.push(c); recordWrong(c, true);
  document.getElementById('buttons').innerHTML = '<button class="btn btn-next" onclick="current++;showSpeakCard()">Next</button>';
  updateStats();
}

function showSpeakAnswer() {
  if (speakAnswerVisible) return;
  speakAnswerVisible = true;
  document.getElementById('speakAnswer').classList.remove('hidden');
  document.getElementById('speakHint').textContent = 'Did you get it right?';
  document.getElementById('buttons').innerHTML = '<button class="btn btn-again" onclick="markAgain()">Again</button><button class="btn btn-good" onclick="markGood()">Got it</button>';
}

// ---- KNS (Kennis van de Nederlandse Samenleving) ----
function getAllKnsTopics() { return [...new Set(KNS_CARDS.map(c => c[5]))]; }
function getKnsFiltered() {
  if (knsTopics.size === 0) return KNS_CARDS;
  return KNS_CARDS.filter(c => knsTopics.has(c[5]));
}
const KNS_TOPIC_LABELS = {land:'Land & Steden',geschiedenis:'Geschiedenis',staatsinrichting:'Staatsinrichting','dagelijks leven':'Dagelijks Leven',onderwijs:'Onderwijs',gezondheid:'Gezondheid',werk:'Werk & Inkomen'};

function showKnsFilter() {
  let kf = document.getElementById('knsFilter');
  const container = document.getElementById('knsTopFilter');
  if (!kf) {
    kf = document.createElement('div');
    kf.id = 'knsFilter';
    kf.className = 'speak-filter';
  }
  if (kf.parentElement !== container) container.appendChild(kf);
  kf.style.display = 'flex';
  kf.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'speak-filter-btn' + (knsTopics.size === 0 ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { knsTopics.clear(); showKnsFilter(); startKnsSession(); };
  kf.appendChild(allBtn);
  getAllKnsTopics().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'speak-filter-btn' + (knsTopics.has(t) ? ' active' : '');
    btn.textContent = KNS_TOPIC_LABELS[t] || t;
    btn.onclick = () => {
      if (knsTopics.has(t)) knsTopics.delete(t); else knsTopics.add(t);
      showKnsFilter(); startKnsSession();
    };
    kf.appendChild(btn);
  });
}

function startKnsSession() {
  const filtered = getKnsFiltered();
  deck = shuffle(filtered.map(c => [...c]));
  sessionTotal = deck.length;
  current = 0; known = 0; again = [];
  if (deck.length > 0) showKnsCard(); else showEmpty();
  updateStats();
}

function showKnsCard() {
  if (current >= deck.length) {
    if (again.length > 0) { deck = shuffle(again); again = []; current = 0; showKnsCard(); return; }
    showDone(); return;
  }
  const c = deck[current];
  const topic = KNS_TOPIC_LABELS[c[5]] || c[5];
  document.getElementById('mainArea').innerHTML = `
    <div class="kns-card">
      <div class="kns-tag">${topic}</div>
      <div class="kns-photo-num">Foto ${c[0]}</div>
      <img class="kns-photo" src="photos/${c[0]}.jpg" alt="Foto ${c[0]}" onerror="this.style.display='none'">
      <div class="kns-question">${c[1]}</div>
      <div class="kns-options">
        <button class="kns-option" id="knsOptA" onclick="checkKnsAnswer('a')"><span class="kns-letter">A</span>${c[2]}</button>
        <button class="kns-option" id="knsOptB" onclick="checkKnsAnswer('b')"><span class="kns-letter">B</span>${c[3]}</button>
      </div>
      <div class="kns-result hidden" id="knsResult"></div>
    </div>
    <div class="buttons hidden" id="buttons"></div>`;
  updateStats();
}

function checkKnsAnswer(picked) {
  const c = deck[current];
  const correct = c[4];
  const isCorrect = picked === correct;
  const optA = document.getElementById('knsOptA');
  const optB = document.getElementById('knsOptB');
  optA.disabled = true;
  optB.disabled = true;
  if (correct === 'a') { optA.classList.add('kns-correct'); if (!isCorrect) optB.classList.add('kns-wrong'); }
  else { optB.classList.add('kns-correct'); if (!isCorrect) optA.classList.add('kns-wrong'); }

  const result = document.getElementById('knsResult');
  result.classList.remove('hidden');
  result.innerHTML = isCorrect ? '<span class="kns-ok">Correct!</span>' : '<span class="kns-nope">Fout — het juiste antwoord is ' + (correct === 'a' ? 'A' : 'B') + '</span>';

  if (isCorrect) { known++; recordCorrect(c, 'kns');
    updateStats(); setTimeout(() => { current++; showKnsCard(); }, 1200); return;
  }
  again.push(c); recordWrong(c, 'kns');
  const btns = document.getElementById('buttons');
  btns.classList.remove('hidden');
  btns.innerHTML = '<button class="btn btn-next" onclick="current++;showKnsCard()">Next</button>';
  updateStats();
}

// ---- COMMON ----
function markGood() {
  const c = deck[current];
  recordCorrect(c, mode === 'speak' ? true : mode === 'kns' ? 'kns' : false);
  known++; current++;
  if (mode === 'speak') showSpeakCard(); else if (mode === 'kns') showKnsCard(); else showCard();
  updateStats();
}
function markAgain() {
  const c = deck[current];
  recordWrong(c, mode === 'speak' ? true : mode === 'kns' ? 'kns' : false);
  again.push(c); current++;
  if (mode === 'speak') showSpeakCard(); else if (mode === 'kns') showKnsCard(); else showCard();
  updateStats();
}

// ---- LOGIN / INIT ----
function doLogin() {
  const name = document.getElementById('welcomeInput').value.trim();
  if (!name) { document.getElementById('welcomeInput').style.borderColor = 'var(--red)'; return; }
  setSyncUser(name);
  enterApp();
}
function doSkip() {
  syncUser = '';
  localStorage.setItem('dutch-a1-user', '');
  localStorage.setItem('dutch-a1-skipped', '1');
  enterApp();
}
function enterApp() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('appWrap').style.display = 'flex';
  loadAppState();
  setDirection(direction);
  switchTab(activeTab);
}

// Auto-enter if user already set or skipped before
if (syncUser || localStorage.getItem('dutch-a1-skipped')) {
  enterApp();
}

document.addEventListener('keydown', e => {
  if (mode === 'type' || mode === 'quiz' || mode === 'match' || mode === 'build' || mode === 'write' || mode === 'fill') return;
  if (mode === 'speak' && speakMode === 'write') return;
  if (mode === 'learn') {
    if (e.key === '1' || e.key === 'ArrowLeft') markAgain();
    if (e.key === '2' || e.key === 'ArrowRight') markGood();
    return;
  }
  if (mode === 'speak') {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!speakAnswerVisible) showSpeakAnswer(); }
    if (e.key === '1' || e.key === 'ArrowLeft') { if (speakAnswerVisible) markAgain(); }
    if (e.key === '2' || e.key === 'ArrowRight') { if (speakAnswerVisible) markGood(); }
    return;
  }
  if (mode === 'kns') {
    const optA = document.getElementById('knsOptA');
    if (e.key === 'a' || e.key === 'A' || e.key === '1') { if (optA && !optA.disabled) checkKnsAnswer('a'); }
    if (e.key === 'b' || e.key === 'B' || e.key === '2') { if (optA && !optA.disabled) checkKnsAnswer('b'); }
    if ((e.key === ' ' || e.key === 'Enter') && optA && optA.disabled) { e.preventDefault(); current++; showKnsCard(); }
    return;
  }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!isFlipped) flipCard(); }
  if (e.key === '1' || e.key === 'ArrowLeft') { if (isFlipped) markAgain(); }
  if (e.key === '2' || e.key === 'ArrowRight') { if (isFlipped) markGood(); }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  const APP_VERSION = '2';
  const swCode = `
    const CACHE = 'dutch-a1-v${APP_VERSION}';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request))
      );
    });
    self.addEventListener('message', e => {
      if (e.data === 'skipWaiting') self.skipWaiting();
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).then(reg => {
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'activated') location.reload();
      });
    });
    // Check for updates every 5 min
    setInterval(() => reg.update(), 5 * 60 * 1000);
  }).catch(() => {});
}
</script>
